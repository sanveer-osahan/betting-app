services:
  - type: web
    runtime: node
    name: betting-app
    repo: https://github.com/sanveer-osahan/betting-app
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: betting-app-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: betting-app-db
    plan: free
    region: oregon
